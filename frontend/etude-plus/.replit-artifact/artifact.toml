kind = "web"
previewPath = "/"
title = "Étude+"
version = "1.0.0"
id = "artifacts/etude-plus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23925
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/etude-plus run dev"

[services.env]
PORT = "23925"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/etude-plus", "run", "build"]
publicDir = "artifacts/etude-plus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
